name: Update WC2026 results

on:
  schedule:
    # Every 30 minutes. GitHub may delay scheduled runs under load.
    - cron: '*/30 * * * *'
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write          # needed to commit results.json back to the repo

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/fetch-results.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain results.json)" ]; then
            git add results.json
            git commit -m "chore: update results.json [skip ci]"
            git push
          else
            echo "No changes to results.json"
          fi
