name: Update WC2026 results

on:
  schedule:
    # Fallback only. GitHub heavily throttles/skips scheduled runs, so in practice
    # this fires roughly once an hour, not every 5 min. For real near-live updates,
    # drive it externally via the repository_dispatch trigger below.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}   # allow manual runs from the Actions tab
  repository_dispatch:
    # External driver (e.g. a 1-minute cron on Cron-job.org / Cloudflare Worker / any
    # always-on host) can POST to the GitHub API to fire this on demand:
    #   curl -X POST \
    #     -H "Accept: application/vnd.github+json" \
    #     -H "Authorization: Bearer <PAT with 'repo' scope>" \
    #     https://api.github.com/repos/<owner>/<repo>/dispatches \
    #     -d '{"event_type":"update-results"}'
    types: [update-results]

permissions:
  contents: write          # needed to commit results.json back to the repo

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/fetch-results.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain results.json)" ]; then
            git add results.json
            git commit -m "chore: update results.json [skip ci]"
            git push
          else
            echo "No changes to results.json"
          fi
